apiVersion: batch/v1
kind: Job
metadata:
  name: flag-db-init
  namespace: flag-service
  annotations:
    # Roda ANTES do Deployment ser aplicado pelo ArgoCD
    argocd.argoproj.io/hook: PreSync
    # ArgoCD deleta o Job após sucesso, permitindo re-execução no próximo deploy
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-auth-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for auth-service to be ready..."
              until wget -qO- http://app-auth-service.auth-service.svc.cluster.local:8001/health > /dev/null 2>&1; do
                echo "auth-service not ready, retrying in 5s..."
                sleep 5
              done
              echo "auth-service is ready."
      containers:
        - name: psql
          image: postgres:15-alpine
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for flag database to be ready..."
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER"; do
                echo "Database not ready, retrying in 2s..."
                sleep 2
              done

              echo "Running init.sql..."
              PGPASSWORD="$POSTGRES_PASSWORD" psql \
                -h "$POSTGRES_HOST" \
                -p "$POSTGRES_PORT" \
                -U "$POSTGRES_USER" \
                -d "$POSTGRES_DB" \
                -f /sql/init.sql

              echo "Verifying tables created..."
              PGPASSWORD="$POSTGRES_PASSWORD" psql \
                -h "$POSTGRES_HOST" \
                -p "$POSTGRES_PORT" \
                -U "$POSTGRES_USER" \
                -d "$POSTGRES_DB" \
                -c "\dt"
              echo "flag-db-init Job completed successfully."
          volumeMounts:
            - name: sql-volume
              mountPath: /sql
          envFrom:
            - secretRef:
                name: flag-db-secret
            - secretRef:
                name: flag-db-secret-host
      volumes:
        - name: sql-volume
          configMap:
            name: db-flag-service-init-sql
