apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app-flag-service
  name: app-flag-service
  namespace: flag-service
spec:
  strategy:
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: app-flag-service
  template:
    metadata:
      labels:
        app: app-flag-service
    spec:
      # flag-service chama auth-service /validate em TODA request.
      # O initContainer garante que o auth-service esteja healthy
      # antes do pod entrar em serviço.
      initContainers:
        - name: wait-for-auth-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for auth-service to be healthy..."
              until wget -qO- http://app-auth-service.auth-service.svc.cluster.local:8001/health > /dev/null 2>&1; do
                echo "auth-service not ready, retrying in 5s..."
                sleep 5
              done
              echo "auth-service is ready. Starting flag-service."
      containers:
        - name: app-flag-service
          image: REPLACE_ECR_REGISTRY/togglemaster_flag-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "250m"
              memory: "206Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 8002
            failureThreshold: 180
            periodSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: flag-db-secret       # POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, POSTGRES_PORT, AUTH_SERVICE_URL
            - secretRef:
                name: flag-db-secret-host  # POSTGRES_HOST
