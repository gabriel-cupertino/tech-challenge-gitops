apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app-evaluation-service
  name: app-evaluation-service
  namespace: evaluation-service
spec:
  strategy:
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: app-evaluation-service
  template:
    metadata:
      labels:
        app: app-evaluation-service
    spec:
      # evaluation-service chama flag-service e targeting-service em TODA request de avaliação.
      # Ambos precisam estar healthy antes do evaluation-service começar a servir tráfego.
      #
      # DEPENDÊNCIA DE SERVICE_API_KEY:
      # evaluation-service usa SERVICE_API_KEY (injetada via Secret 'evaluation-db-secret')
      # para autenticar contra flag-service e targeting-service.
      # Pré-requisito manual: criar a chave no auth-service e armazená-la no Secret
      # ANTES do primeiro deploy (ver CLAUDE.md - seção "Provisionamento do SERVICE_API_KEY").
      initContainers:
        - name: wait-for-flag-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for flag-service to be healthy..."
              until wget -qO- http://app-flag-service.flag-service.svc.cluster.local:8002/health > /dev/null 2>&1; do
                echo "flag-service not ready, retrying in 5s..."
                sleep 5
              done
              echo "flag-service is ready."

        - name: wait-for-targeting-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for targeting-service to be healthy..."
              until wget -qO- http://app-targeting-service.targeting-service.svc.cluster.local:8003/health > /dev/null 2>&1; do
                echo "targeting-service not ready, retrying in 5s..."
                sleep 5
              done
              echo "targeting-service is ready. Starting evaluation-service."
      containers:
        - name: app-evaluation-service
          image: 834615370464.dkr.ecr.us-east-1.amazonaws.com/togglemaster_evaluation-service:e574250c2e06f67784c3ccbd984d97d3c4a4daca
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 8004
            failureThreshold: 180
            periodSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: evaluation-db-secret       # FLAG_SERVICE_URL, TARGETING_SERVICE_URL, SERVICE_API_KEY
            - secretRef:
                name: evaluation-db-secret-host  # REDIS_URL, AWS_SQS_URL, AWS_REGION
