apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: targeting-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/gabriel-cupertino/tech-challenge-gitops.git
    targetRevision: main
    path: targeting-service
  destination:
    server: https://kubernetes.default.svc
    namespace: targeting-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
